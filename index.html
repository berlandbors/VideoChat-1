<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>VideoChat+</title>
  <meta name="description" content="P2P видеочат с текстовым чатом — без сервера" />
  <meta name="theme-color" content="#4CAF50" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VideoChat+" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.scaledrone.com/scaledrone.min.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Индикатор оффлайн -->
  <div id="offlineIndicator" class="hidden">
    <span>📵</span> Нет подключения к интернету
  </div>

  <!-- Форма входа -->
  <div id="loginForm">
    <h3 style="text-align:center; margin-top:0;">Вход в VideoChat+</h3>
    <div class="form-group">
      <label for="userName">Ваше имя:</label>
      <input type="text" id="userName" placeholder="Введите ваше имя">
    </div>
    <div class="form-group">
      <label for="channelId">ScaleDrone Channel ID:</label>
      <input type="text" id="channelId" placeholder="Введите Channel ID">
    </div>
    <div class="form-group">
      <label for="roomName">Название комнаты:</label>
      <input type="text" id="roomName" placeholder="Введите название комнаты">
    </div>
    <button onclick="initializeChat()">Подключиться</button>
  </div>

  <!-- Видео -->
  <video id="remoteVideo" autoplay playsinline class="hidden"></video>
  <video id="localVideo"  autoplay muted playsinline class="hidden"></video>

  <!-- Статус -->
  <div id="status" class="hidden">
    <div id="statusDot"></div>
    <div id="statusText">Ожидание...</div>
  </div>

  <!-- Панель управления -->
  <div id="controls" class="hidden">
    <button class="control-btn" id="startButton" onclick="startCall()" title="Начать звонок" aria-label="Начать видеозвонок">📞</button>
    <button class="control-btn danger" onclick="endCall()" title="Завершить звонок" aria-label="Завершить звонок">❌</button>
    <button class="control-btn" id="micButton" onclick="toggleMic()" title="Микрофон" aria-label="Включить/выключить микрофон">🎤</button>
    <button class="control-btn" id="camButton" onclick="toggleCam()" title="Камера" aria-label="Включить/выключить камеру">📷</button>
    <button class="control-btn" id="switchCamBtn" onclick="switchCamera()" title="Переключить камеру" aria-label="Переключить камеру">🔁</button>
    <button class="control-btn" id="chatToggleBtn" onclick="toggleChat()" title="Открыть чат" aria-label="Открыть/закрыть чат">💬<span id="unreadBadge" class="unread-badge hidden">0</span></button>
    <button class="control-btn" id="notifBtn" onclick="requestNotificationPermission()" title="Уведомления" aria-label="Разрешить уведомления">🔔</button>
  </div>

  <!-- Инфо о комнате -->
  <div id="roomInfo" class="hidden">
    <div>Комната: <span id="currentRoomName"></span></div>
    <button id="copyRoomBtn" onclick="copyRoomName()">📋 Скопировать</button>
    <button id="shareRoomBtn" onclick="shareRoom()">🔗 Поделиться</button>
  </div>

  <!-- Информация о участниках -->
  <div id="usersInfo" class="hidden">
    <div class="users-header">👥 Участники (<span id="userCount">0</span>)</div>
    <div id="usersList"></div>
  </div>

  <!-- Диагностика сети -->
  <div id="networkDiag" class="hidden">
    <div class="diag-header">📊 Диагностика</div>
    <div id="connectionQuality" class="diag-item">
      <span class="diag-label">Качество:</span>
      <span id="qualityValue">Проверка...</span>
    </div>
    <div id="latencyInfo" class="diag-item">
      <span class="diag-label">Задержка:</span>
      <span id="latencyValue">—</span>
    </div>
    <div id="packetLoss" class="diag-item">
      <span class="diag-label">Потери:</span>
      <span id="packetLossValue">—</span>
    </div>
    <div id="connectionType" class="diag-item">
      <span class="diag-label">Тип:</span>
      <span id="connectionTypeValue">—</span>
    </div>
    <button id="toggleDiagBtn" class="diag-toggle" onclick="toggleDiagDetails()">▼ Подробнее</button>
    <div id="diagDetails" class="hidden">
      <div class="diag-item">
        <span class="diag-label">Видео:</span>
        <span id="videoBitrate">—</span>
      </div>
      <div class="diag-item">
        <span class="diag-label">Аудио:</span>
        <span id="audioBitrate">—</span>
      </div>
    </div>
  </div>

  <!-- Панель чата -->
  <div id="chatPanel" class="chat-panel hidden">
    <div class="chat-header">
      <span>💬 Чат</span>
      <div class="chat-header-right">
        <span id="peerStatusIndicator" class="peer-status" title="Статус собеседника">⚪</span>
        <button class="chat-close-btn" onclick="toggleChat()" title="Свернуть">✕</button>
      </div>
    </div>
    <div id="chatMessages" class="chat-messages"></div>
    <div id="typingIndicator" class="typing-indicator hidden">Собеседник печатает…</div>
    <div class="chat-input-area">
      <textarea
        id="chatInput"
        class="chat-input"
        placeholder="Введите сообщение… (Enter — отправить, Shift+Enter — новая строка)"
        rows="1"
      ></textarea>
      <button class="chat-send-btn" onclick="sendChatMessage()" title="Отправить">➤</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
